<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220" width="100%" height="auto">
  <style>
    .node-text {
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 11px;
      font-weight: 500;
      fill: currentColor;
    }
    .node-title {
      font-family: 'Lora', Georgia, serif;
      font-size: 13px;
      font-weight: bold;
      fill: currentColor;
      font-style: italic;
    }
    .line-flow {
      stroke: currentColor;
      stroke-width: 1;
      fill: none;
      stroke-dasharray: 4 2;
    }
    .line-solid {
      stroke: currentColor;
      stroke-width: 1.25;
      fill: none;
    }
    .node-box {
      stroke: currentColor;
      stroke-width: 1;
      fill: none;
    }
    .marker-arrow {
      fill: currentColor;
    }
  </style>

  <!-- Define arrow markers -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 2 L 8 5 L 0 8 z" class="marker-arrow" />
    </marker>
  </defs>

  <!-- Step 1: Concept Build -->
  <g transform="translate(15, 60)">
    <rect x="0" y="0" width="110" height="70" rx="3" class="node-box" />
    <text x="55" y="28" text-anchor="middle" class="node-title">01. Concept</text>
    <text x="55" y="46" text-anchor="middle" class="node-text">Build Clarity</text>
    <text x="55" y="58" text-anchor="middle" class="node-text">(Lectures)</text>
  </g>

  <!-- Arrow 1 to 2 -->
  <line x1="125" y1="95" x2="155" y2="95" class="line-solid" marker-end="url(#arrow)" />

  <!-- Step 2: Read Books -->
  <g transform="translate(165, 60)">
    <rect x="0" y="0" width="110" height="70" rx="3" class="node-box" />
    <text x="55" y="28" text-anchor="middle" class="node-title">02. Sources</text>
    <text x="55" y="46" text-anchor="middle" class="node-text">Standard Books</text>
    <text x="55" y="58" text-anchor="middle" class="node-text">&amp; NCERTs</text>
  </g>

  <!-- Arrow 2 to 3 -->
  <line x1="275" y1="95" x2="305" y2="95" class="line-solid" marker-end="url(#arrow)" />

  <!-- Step 3: Analyze PYQs -->
  <g transform="translate(315, 60)">
    <rect x="0" y="0" width="110" height="70" rx="3" class="node-box" />
    <text x="55" y="28" text-anchor="middle" class="node-title">03. Syllabus</text>
    <text x="55" y="46" text-anchor="middle" class="node-text">Analyze PYQs</text>
    <text x="55" y="58" text-anchor="middle" class="node-text">&amp; Direct Topics</text>
  </g>

  <!-- Arrow 3 to 4 -->
  <line x1="425" y1="95" x2="455" y2="95" class="line-solid" marker-end="url(#arrow)" />

  <!-- Step 4: Active Revision -->
  <g transform="translate(465, 60)">
    <rect x="0" y="0" width="110" height="70" rx="3" class="node-box" />
    <text x="55" y="28" text-anchor="middle" class="node-title">04. Revision</text>
    <text x="55" y="46" text-anchor="middle" class="node-text">Active Recall</text>
    <text x="55" y="58" text-anchor="middle" class="node-text">&amp; Retention</text>
  </g>

  <!-- Loop back path from step 4 back to step 1 -->
  <path d="M 520 130 L 520 170 L 70 170 L 70 130" class="line-flow" marker-end="url(#arrow)" />
  <text x="295" y="188" text-anchor="middle" class="node-text" style="font-style: italic; opacity: 0.85;">Continuous Iterative Learning Loop</text>
</svg>
